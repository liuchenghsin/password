<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>🏆 密碼防禦競賽大螢幕</title>
<style>
body{
    font-family: "Segoe UI", sans-serif;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color:white;
    text-align:center;
    padding:20px;
}

h1{
    font-size:48px;
    color:#38bdf8;
    margin-bottom:10px;
}

.timer{
    font-size:36px;
    color:#facc15;
    margin:15px;
}

input{
    padding:12px;
    font-size:20px;
    border-radius:10px;
    border:none;
    margin:6px;
}

button{
    padding:12px 24px;
    font-size:20px;
    background:#22c55e;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

button:disabled{
    background:#475569;
    cursor:not-allowed;
}

.strength{
    width:300px;
    height:18px;
    background:#1e293b;
    margin:10px auto;
    border-radius:10px;
    overflow:hidden;
}

.bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#ef4444,#facc15,#22c55e);
    transition:0.3s;
}

table{
    margin:30px auto;
    border-collapse:collapse;
    width:720px;
    font-size:22px;
    background:#0f172a;
}

th,td{
    padding:14px;
    border-bottom:1px solid #334155;
}

.gold{ background:#ca8a04; }
.silver{ background:#94a3b8; }
.bronze{ background:#b45309; }

.reveal{ color:#fb7185; font-weight:bold; }

.warning{
    color:#fb7185;
    font-size:22px;
    height:28px;
}
</style>
</head>
<body>

<h1>🏆 密碼防禦競賽</h1>
<div class="timer">⏳ 剩餘時間：<span id="time">10:00</span></div>

<div>
<input id="nickname" placeholder="暱稱">
<input id="pwd" type="password" placeholder="輸入最強密碼" oninput="updateStrength()">
<button id="submitBtn" onclick="submitPassword()">送出挑戰</button>
</div>

<div class="strength"><div class="bar" id="bar"></div></div>
<div class="warning" id="warn"></div>

<table>
<thead>
<tr>
<th>排名</th>
<th>暱稱</th>
<th>破解時間（年）</th>
<th id="pwdHeader" style="display:none;">密碼</th>
</tr>
</thead>
<tbody id="board"></tbody>
</table>

<script>
const ATTACK_RATE = 1e12;
let leaderboard = [];
let usedNames = new Set();
let timeLeft = 600;
let revealed = false;

// ===== 強度條 =====
function updateStrength(){
    const pwd=document.getElementById("pwd").value;
    const years=calculateYears(pwd);
    let score=Math.min(100,Math.log10(years+1)*20);
    document.getElementById("bar").style.width=score+"%";
}

// ===== 字元集 =====
function getCharsetSize(pwd){
    let size=0;
    if(/[a-z]/.test(pwd)) size+=26;
    if(/[A-Z]/.test(pwd)) size+=26;
    if(/[0-9]/.test(pwd)) size+=10;
    if(/[^a-zA-Z0-9]/.test(pwd)) size+=32;
    return size||1;
}

function calculateYears(pwd){
    if(!pwd) return 0;
    const charset=getCharsetSize(pwd);
    const combos=Math.pow(charset,pwd.length);
    const seconds=combos/ATTACK_RATE;
    return seconds/(60*60*24*365);
}

function formatYears(y){
    if(y>1e9) return "∞";
    if(y<0.01) return "<0.01";
    return y.toFixed(2);
}

// ===== 提交 =====
function submitPassword(){
    if(timeLeft<=0) return;

    const name=document.getElementById("nickname").value.trim();
    const pwd=document.getElementById("pwd").value;

    if(!name||!pwd){
        alert("請輸入暱稱與密碼");
        return;
    }

    if(usedNames.has(name)){
        alert("此暱稱已使用！");
        return;
    }

    const years=calculateYears(pwd);

    const beforeTop3=leaderboard.slice(0,3).map(x=>x.name);

    leaderboard.push({name,pwd,years});
    usedNames.add(name);

    leaderboard.sort((a,b)=>b.years-a.years);
    leaderboard=leaderboard.slice(0,3);

    const afterTop3=leaderboard.map(x=>x.name);

    // 被擠掉警告
    const dropped=beforeTop3.find(x=>!afterTop3.includes(x));
    if(dropped){
        document.getElementById("warn").textContent=
            `⚠️ ${dropped} 已被擠出前三！`;
        setTimeout(()=>document.getElementById("warn").textContent="",3000);
    }

    renderBoard();
    document.getElementById("pwd").value="";
    updateStrength();
}

// ===== 渲染 =====
function renderBoard(){
    const tbody=document.getElementById("board");
    tbody.innerHTML="";

    leaderboard.forEach((item,idx)=>{
        let cls="";
        if(idx===0) cls="gold";
        else if(idx===1) cls="silver";
        else if(idx===2) cls="bronze";

        let row=`<tr class="${cls}">
        <td>${idx+1}</td>
        <td>${item.name}</td>
        <td>${formatYears(item.years)}</td>`;

        if(revealed){
            row+=`<td class="reveal">${item.pwd}</td>`;
        }

        row+=`</tr>`;
        tbody.innerHTML+=row;
    });
}

// ===== 揭示 =====
function revealPasswords(){
    revealed=true;
    document.getElementById("pwdHeader").style.display="";
    document.getElementById("submitBtn").disabled=true;
    renderBoard();
    alert("⏰ 時間到！密碼已揭示！");
}

// ===== 倒數 =====
setInterval(()=>{
    if(timeLeft<=0) return;
    timeLeft--;

    const m=Math.floor(timeLeft/60);
    const s=timeLeft%60;
    document.getElementById("time").textContent=
        `${m}:${s.toString().padStart(2,"0")}`;

    if(timeLeft===0) revealPasswords();
},1000);
</script>

</body>
</html>
